name: Main CI - Test, Build & Deploy
on:
  push:
    branches: [ main ]

jobs:
  android:
    name: Android Test, Build AppBundle & Distribute
    runs-on: ubuntu-latest
    environment: Esteira
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --no-color

      - name: Restore Android debug keystore
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then echo "ANDROID_DEBUG_KEYSTORE_BASE64 is not set. Aborting." && exit 1; fi
          mkdir -p ~/.android
          echo "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > ~/.android/debug.keystore

      - name: Build APK
        run: flutter build apk --release

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Distribute to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then echo "FIREBASE_TOKEN is not set. Aborting." && exit 1; fi
          if [ -z "$FIREBASE_ANDROID_APP_ID" ]; then echo "FIREBASE_ANDROID_APP_ID is not set. Aborting." && exit 1; fi
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk --app $FIREBASE_ANDROID_APP_ID --groups "ufba---matc89" --token "$FIREBASE_TOKEN"

